<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>TratamentoWeb - Sistema de Gestão de Saúde</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#1a237e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TratamentoWeb">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="TratamentoWeb">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/imagens/icone.ico">
    <link rel="shortcut icon" href="/imagens/icone.ico" type="image/x-icon">
    
    <!-- PWA Icons -->
    <link rel="apple-touch-icon" href="/imagens/logo-192.png">
    <link rel="manifest" href="/manifest.json">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- CSS Principal -->
    <link rel="stylesheet" href="0_style.css">
    
    <!-- Chart.js para gráficos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    
    <!-- Meta tags -->
    <meta name="description" content="Sistema de gestão de saúde com avaliações nutricionais e psicológicas">
    <meta name="author" content="TratamentoWeb">
    
    <!-- Pré-conexão para otimização -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://www.gstatic.com">
</head>
<body>
    <div id="app"></div>
    
    <script type="module" src="scripts_telas/login.js"></script>
    
    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- PWA Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('Service Worker registrado com sucesso:', registration);
                    })
                    .catch(error => {
                        console.log('Erro ao registrar Service Worker:', error);
                    });
            });
        }
    </script>
</body>
</html>
